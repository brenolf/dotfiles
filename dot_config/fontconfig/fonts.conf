<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Alias the Nerd Fonts standard name to the locally installed p10k variant -->
  <alias>
    <family>MesloLGS Nerd Font Mono</family>
    <prefer>
      <family>MesloLGS NF</family>
    </prefer>
  </alias>
</fontconfig>
